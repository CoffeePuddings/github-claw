# Validates that every skill directory under .agents/skills/ contains a well-formed skill.yml
name: Validate Skills

on:
  push:
    paths:
      - ".agents/skills/**"
  pull_request:
    paths:
      - ".agents/skills/**"
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate skill manifests
        run: |
          set -euo pipefail
          SKILLS_DIR=".agents/skills"
          errors=0

          for skill_dir in "$SKILLS_DIR"/*/; do
            skill_name=$(basename "$skill_dir")
            manifest="$skill_dir/skill.yml"

            if [ ! -f "$manifest" ]; then
              echo "❌ $skill_name: 缺少 skill.yml"
              errors=$((errors + 1))
              continue
            fi

            # Check required fields: name, description, version, usage
            for field in name description version usage; do
              if ! grep -q "^${field}:" "$manifest"; then
                echo "❌ $skill_name/skill.yml: 缺少必填字段 '$field'"
                errors=$((errors + 1))
              fi
            done

            echo "✅ $skill_name"
          done

          if [ "$errors" -gt 0 ]; then
            echo ""
            echo "发现 $errors 个错误，请修复后重试。"
            exit 1
          fi

          echo ""
          echo "所有技能清单验证通过。"
